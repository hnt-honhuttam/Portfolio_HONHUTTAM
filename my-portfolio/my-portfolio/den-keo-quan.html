<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đèn Kéo Quân 3D | Bài Thi Giữa Kỳ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* CSS CHO HIỆU ỨNG 3D ĐÈN KÉO QUÂN */
        .scene {
            width: 250px;
            height: 200px;
            perspective: 1000px;
            margin: 60px auto 100px;
        }
        .carousel {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: spinCarousel 12s infinite linear;
            cursor: pointer;
        }
        .carousel__cell {
            position: absolute;
            width: 250px;
            height: 180px;
            left: 0;
            top: 0;
            border: 3px solid rgba(236, 72, 153, 0.8);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.3);
            transition: transform 0.3s;
        }
        .carousel__cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Tính toán góc quay cho 6 mặt (360 độ / 6 = 60 độ) */
        .carousel__cell:nth-child(1) { transform: rotateY(  0deg) translateZ(240px); }
        .carousel__cell:nth-child(2) { transform: rotateY( 60deg) translateZ(240px); }
        .carousel__cell:nth-child(3) { transform: rotateY(120deg) translateZ(240px); }
        .carousel__cell:nth-child(4) { transform: rotateY(180deg) translateZ(240px); }
        .carousel__cell:nth-child(5) { transform: rotateY(240deg) translateZ(240px); }
        .carousel__cell:nth-child(6) { transform: rotateY(300deg) translateZ(240px); }

        @keyframes spinCarousel {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-100 antialiased font-sans min-h-screen flex flex-col relative">
    
    <div class="bg-animated"></div>

    <nav class="fixed top-0 left-0 right-0 z-50 glass-nav border-b border-white/20">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tight flex items-center">
                Tâm<span class="text-white bg-pink-500 rounded px-1.5 py-0.5 ml-1 text-lg">.IT</span>
            </a>
            <a href="index.html" class="px-4 py-2 bg-slate-800 text-white rounded-xl text-sm font-bold hover:bg-pink-500 transition-colors">
                <i class="fa-solid fa-arrow-left"></i> Quay lại Portfolio
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center pt-28 pb-10 px-6">
        <div class="glass-card max-w-4xl w-full rounded-[2.5rem] p-10 text-center relative overflow-hidden">
            <h1 class="text-3xl md:text-4xl font-extrabold text-slate-800 dark:text-white mb-4">Mô Hình Đèn Kéo Quân 3D</h1>
            <p class="text-slate-600 dark:text-slate-300 mb-8 font-medium">Bài kiểm tra Giữa kỳ LTW - Hãy rê chuột vào hình ảnh để dừng đèn!</p>

            <div class="scene">
                <div class="carousel" id="denKeoQuan">
                    <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1550439062-609e1531270e?w=500&q=80" alt="Hinh 1"></div>
                    <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1511556532299-8f662fc26c06?w=500&q=80" alt="Hinh 2"></div>
                    <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=500&q=80" alt="Hinh 3"></div>
                    <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500&q=80" alt="Hinh 4"></div>
                    <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=500&q=80" alt="Hinh 5"></div>
                    <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=500&q=80" alt="Hinh 6"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const den = document.getElementById('denKeoQuan');
            
            // Khi rê chuột vào -> Dừng lại
            den.addEventListener('mouseenter', () => {
                den.style.animationPlayState = 'paused';
            });
            
            // Khi đưa chuột ra -> Quay tiếp
            den.addEventListener('mouseleave', () => {
                den.style.animationPlayState = 'running';
            });
        });
    </script>
</body>
</html>
